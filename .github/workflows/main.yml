name: 15-Day Continuous VPS

on:
  workflow_dispatch: 
  schedule:
    - cron: '0 */5 * * *' 

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-vps:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure System & SSH Server
        run: |
          sudo apt-get update
          sudo apt-get install -y openssh-server build-essential curl wget screen zip unzip
          sudo mkdir -p /var/run/sshd
          
          # Set the SSH login credentials
          echo 'root:VpsPassword2026!' | sudo chpasswd
          sudo sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config
          sudo sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo service ssh restart
          
          mkdir -p /home/runner/workspace

      - name: Install & Configure Ngrok
        run: |
          curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
          echo "deb https://ngrok-agent.s3.amazonaws.com/ buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
          sudo apt-get update && sudo apt-get install ngrok
          
          # Validation check for secret
          if [ -z "${{ secrets.NGROK_AUTH_TOKEN }}" ]; then
            echo "===================================================="
            echo "ERROR: NGROK_AUTH_TOKEN IS EMPTY!"
            echo "Please go to Settings -> Secrets and variables -> Actions"
            echo "Create a new secret named NGROK_AUTH_TOKEN and paste your token."
            echo "===================================================="
            exit 1
          fi
          ngrok config add-authtoken "${{ secrets.NGROK_AUTH_TOKEN }}"

      - name: Restore Previous Session Data
        run: |
          cd /home/runner
          if [ ! -z "${{ secrets.BACKUP_DOWNLOAD_URL }}" ]; then
            echo "Found previous backup link. Attempting restoration..."
            wget --no-check-certificate -O backup.zip "${{ secrets.BACKUP_DOWNLOAD_URL }}" || echo "Download link expired or invalid."
            if [ -f backup.zip ]; then
              unzip -o backup.zip -d /home/runner/workspace
              rm backup.zip
              echo "Restoration complete."
            fi
          else
            echo "First-time launch. Workspace ready."
            echo "# Put your data here" > /home/runner/workspace/README.txt
          fi

      - name: Start Network Tunnel & Run Cycle
        run: |
          screen -dmS ngrok_tunnel ngrok tcp 22
          
          echo "===================================================="
          echo " VPS ONLINE AND RUNNING NORMAL"
          echo "===================================================="
          echo "1. Go to: https://dashboard.ngrok.com/endpoints/status"
          echo "2. Copy the TCP address (e.g., 0.tcp.ngrok.io:12345)"
          echo "3. Connect in your terminal using:"
          echo "   ssh root@your-ngrok-host -p your-ngrok-port"
          echo "   Password is: VpsPassword2026!"
          echo "===================================================="
          echo "IMPORTANT: ALWAYS SAVE YOUR WORK INSIDE: /home/runner/workspace"
          echo "===================================================="
          
          DURATION=18000
          while [ $DURATION -gt 0 ]; do
            echo "VPS status: Active. Time remaining in this shift: ${DURATION}s"
            sleep 300
            DURATION=$((DURATION - 300))
          done

      - name: Automated Session Backup
        if: always() 
        run: |
          cd /home/runner
          # Only attempt backup if workspace exists and the previous build actually ran
          if [ -d "workspace" ] && [ -f "workspace/README.txt" ] || [ "$(ls -A workspace 2>/dev/null)" ]; then
            echo "Packaging current workspace environment..."
            zip -r backup.zip workspace
            
            echo "Uploading backup archive..."
            # Using transfer.sh as a highly stable alternative that returns a clean string URL
            DOWNLOAD_LINK=$(curl --insecure --upload-file ./backup.zip https://transfer.sh/backup.zip)
            
            if [ ! -z "$DOWNLOAD_LINK" ]; then
              echo "===================================================="
              echo "BACKUP SUCCESSFUL"
              echo "Copy this link and update your repository secret 'BACKUP_DOWNLOAD_URL':"
              echo "$DOWNLOAD_LINK"
              echo "===================================================="
            else
              echo "Backup service upload failed."
            fi
          else
            echo "Workspace is empty or startup was cancelled. Skipping backup processing."
          fi

name: 15-Day Continuous VPS (Tailscale Fully Fixed)

on:
  workflow_dispatch: 
  schedule:
    - cron: '0 */5 * * *' 

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-vps:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure System & SSH Server
        run: |
          sudo apt-get update
          sudo apt-get install -y openssh-server build-essential curl wget screen zip unzip
          sudo mkdir -p /var/run/sshd
          
          # Set up root SSH login privileges correctly
          echo 'root:VpsPassword2026!' | sudo chpasswd
          sudo sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config
          sudo sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo service ssh restart
          
          # Use user directory to completely avoid permission denied errors
          mkdir -p /home/runner/workspace

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTH_KEY }}
          # Prevents container routing conflicts within the runner environment
          args: --snat-subnet-routes=false --accept-dns=false

      - name: Restore Previous Session Data
        run: |
          cd /home/runner
          if [ ! -z "${{ secrets.BACKUP_DOWNLOAD_URL }}" ]; then
            echo "Found previous backup link. Attempting restoration..."
            wget --no-check-certificate -O backup.zip "${{ secrets.BACKUP_DOWNLOAD_URL }}" || echo "Download link expired or invalid."
            if [ -f backup.zip ]; then
              unzip -o backup.zip -d /home/runner/workspace
              rm backup.zip
              echo "Restoration complete."
            fi
          else
            echo "First-time launch. Workspace ready."
            echo "# Put your data here" > /home/runner/workspace/README.txt
          fi

      - name: Start Network & Run Cycle
        run: |
          # Fetch the assigned Tailscale IP address
          TAILSCALE_IP=$(tailscale ip -4)
          
          echo "===================================================="
          echo " VPS ONLINE AND RUNNING NORMAL ON TAILSCALE"
          echo "===================================================="
          echo "Your Fixed Tailscale VPS IP is: $TAILSCALE_IP"
          echo "Connect in your terminal using:"
          echo "   ssh root@$TAILSCALE_IP"
          echo "   Password is: VpsPassword2026!"
          echo "===================================================="
          echo "IMPORTANT: ALWAYS SAVE YOUR WORK INSIDE: /home/runner/workspace"
          echo "===================================================="
          
          DURATION=18000
          while [ $DURATION -gt 0 ]; do
            echo "VPS status: Active. Time remaining in this shift: ${DURATION}s"
            sleep 300
            DURATION=$((DURATION - 300))
          done

      - name: Automated Session Backup
        if: always() 
        run: |
          cd /home/runner
          if [ -d "workspace" ]; then
            echo "Packaging current workspace environment..."
            zip -r backup.zip workspace
            
            echo "Uploading backup archive..."
            # Added --insecure (-k) flag to totally bypass any SSL certificate expiration errors
            DOWNLOAD_LINK=$(curl --insecure --upload-file ./backup.zip https://transfer.sh/backup.zip)
            
            if [ ! -z "$DOWNLOAD_LINK" ]; then
              echo "===================================================="
              echo "BACKUP SUCCESSFUL"
              echo "Copy this link and update your repository secret 'BACKUP_DOWNLOAD_URL':"
              echo "$DOWNLOAD_LINK"
              echo "===================================================="
            else
              echo "Backup service upload failed."
            fi
          else
            echo "Workspace directory not found. Skipping backup step."
          fi
